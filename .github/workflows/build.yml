name: Build Standalone Executables

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        pip install -r requirements.txt

    - name: Build Windows Executable
      if: matrix.os == 'windows-latest'
      run: |
        pyinstaller --noconfirm --onefile --windowed --add-data "public;public" --name "Infinity-Downloader" app.py

    - name: Build Mac App Bundle
      if: matrix.os == 'macos-latest'
      run: |
        pyinstaller --noconfirm --onedir --windowed --add-data "public:public" --name "Infinity Downloader" app.py
        cd dist
        zip -r "../Infinity-Downloader-Mac.zip" "Infinity Downloader.app"

    - name: Upload Windows Artifact
      if: matrix.os == 'windows-latest'
      uses: actions/upload-artifact@v4
      with:
        name: Infinity-Downloader-Windows
        path: dist/Infinity-Downloader.exe

    - name: Upload Mac Artifact
      if: matrix.os == 'macos-latest'
      uses: actions/upload-artifact@v4
      with:
        name: Infinity-Downloader-Mac
        path: Infinity-Downloader-Mac.zip

    - name: Update GitHub Release (Windows)
      if: matrix.os == 'windows-latest'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: latest
        name: Latest Build
        files: dist/Infinity-Downloader.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Update GitHub Release (Mac)
      if: matrix.os == 'macos-latest'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: latest
        name: Latest Build
        files: Infinity-Downloader-Mac.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
